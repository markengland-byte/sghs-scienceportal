<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOL Prep &mdash; Teacher Login</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f2240;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-hero{background:linear-gradient(135deg,#0f2240,#1e3a6e);padding:36px 32px 28px;text-align:center}
.login-hero h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:6px}
.login-hero p{font-size:.85rem;color:rgba(255,255,255,.6)}
.login-body{padding:32px}
.f-group{margin-bottom:18px}
.f-group label{display:block;font-size:.78rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.f-group input{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:.95rem;transition:border-color .2s;outline:none}
.f-group input:focus{border-color:#dc2626}
.login-btn{width:100%;padding:14px;background:#dc2626;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.login-btn:hover{background:#b91c1c}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.err-msg{color:#dc2626;font-size:.82rem;margin-top:10px;text-align:center;display:none}
.back-link{display:block;text-align:center;margin-top:16px;font-size:.82rem;color:#94a3b8;text-decoration:none}
.back-link:hover{color:#0f2240}
.loading-spinner{display:none;text-align:center;margin-top:10px}
.loading-spinner::after{content:'';display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:#dc2626;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-hero">
    <h1>SOL Prep Dashboard</h1>
    <p>Teacher login &mdash; view student progress &amp; manage classes</p>
  </div>
  <div class="login-body">
    <button id="sso-signin-btn" type="button" onclick="signInWithGoogle()"
            style="width:100%;padding:12px;font-size:.95rem;font-weight:600;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:10px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.26c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.71H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
    <div style="text-align:center;color:#94a3b8;font-size:.78rem;margin-bottom:14px">&mdash; or use email &amp; password &mdash;</div>
    <div class="f-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="teacher@school.edu" autocomplete="email">
    </div>
    <div class="f-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="loading-spinner" id="spinner"></div>
    <div class="err-msg" id="err-msg"></div>
    <a class="back-link" href="index.html">&larr; Back to SOL Prep</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0" integrity="sha384-PsnFqJ58vyp7buRfuvdS2SrjRdUYinBv6lWwJXx3xQ17hWefo/UkwXowVBT53ubG" crossorigin="anonymous"></script>
<script>
var SUPABASE_URL = 'https://cogpsieldrgeqlemhosy.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_Wn4L2S2gMPq2cLoiLt2tIQ_z4e7IUZU';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in (legacy session OR returning from Google OAuth
// redirect), verify teacher profile then go to dashboard. If signed in
// as someone without a teachers row, sign them out and show an error
// — keeps random Google accounts from landing on the dashboard.
sb.auth.getSession().then(async function(result) {
  if (!result.data.session) return;
  var uid = result.data.session.user.id;
  var t = await sb.from('teachers').select('id').eq('auth_user_id', uid).maybeSingle();
  if (t.data) {
    window.location.href = 'dashboard.html';
  } else {
    await sb.auth.signOut();
    var errEl = document.getElementById('err-msg');
    if (errEl) {
      errEl.textContent = 'No teacher profile found for that account. Contact your administrator.';
      errEl.style.display = 'block';
    }
  }
});

// Google SSO entry point. Redirects out to Google, then back here;
// the getSession().then(...) block above runs again on return and
// handles the teacher-profile gate before bouncing to dashboard.html.
async function signInWithGoogle() {
  var errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';
  var btn = document.getElementById('sso-signin-btn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
  try {
    var { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.href,
        queryParams: { hd: 'bcpsk12.com' }
      }
    });
    if (error) throw error;
  } catch (e) {
    errEl.textContent = 'Sign-in failed: ' + (e.message || 'unknown error');
    errEl.style.display = 'block';
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  }
}

// Enter key submits
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var errEl = document.getElementById('err-msg');
  var btn = document.getElementById('login-btn');
  var spinner = document.getElementById('spinner');

  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  spinner.style.display = 'block';

  try {
    var { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });

    if (error) {
      errEl.textContent = 'Invalid email or password.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      spinner.style.display = 'none';
      return;
    }

    // Check if user has a teacher profile
    var { data: teacher, error: tErr } = await sb.from('teachers').select('id, display_name').eq('auth_user_id', data.user.id).single();

    if (tErr || !teacher) {
      errEl.textContent = 'No teacher profile found. Contact your administrator.';
      errEl.style.display = 'block';
      await sb.auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Sign In';
      spinner.style.display = 'none';
      return;
    }

    // Success — redirect to dashboard
    window.location.href = 'dashboard.html';

  } catch (e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    spinner.style.display = 'none';
  }
}
</script>
</body>
</html>
