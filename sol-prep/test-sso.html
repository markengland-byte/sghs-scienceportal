<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSO Test — SGHS Portal</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #1e1e1e; color: #d4d4d4; line-height: 1.5; }
    h1 { color: #569cd6; margin-top: 0; }
    p { color: #888; }
    button { background: #0e639c; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px 0; border-radius: 4px; font-family: inherit; }
    button:hover { background: #1177bb; }
    button.danger { background: #a1260d; }
    button.danger:hover { background: #c52b15; }
    pre { background: #252526; padding: 16px; border-radius: 4px; overflow: auto; max-height: 500px; font-size: 12px; }
    #status { padding: 12px; border-radius: 4px; background: #2d2d30; margin: 16px 0; }
    .ok { color: #4ec9b0; font-weight: bold; }
    .err { color: #f48771; font-weight: bold; }
    .label { color: #ce9178; font-weight: bold; }
    .meta { color: #9cdcfe; }
  </style>
</head>
<body>
  <h1>SGHS Portal — SSO Test Page</h1>
  <p>One-off probe: does Google OAuth work for @bcpsk12.com accounts via Supabase? Not linked from any nav. Delete after testing.</p>

  <div id="status">Loading…</div>
  <div id="actions"></div>
  <pre id="output"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.0"></script>
  <script>
    const SUPABASE_URL = 'https://cogpsieldrgeqlemhosy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Wn4L2S2gMPq2cLoiLt2tIQ_z4e7IUZU';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById('status');
    const actionsEl = document.getElementById('actions');
    const outputEl = document.getElementById('output');

    function show(label, obj, kind = 'meta') {
      const text = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
      outputEl.innerHTML += '<span class="label">' + label + ':</span>\n<span class="' + kind + '">' + text + '</span>\n\n';
    }

    async function refresh() {
      outputEl.innerHTML = '';
      const { data: { session }, error } = await sb.auth.getSession();
      if (error) {
        statusEl.innerHTML = '<span class="err">Error checking session: ' + error.message + '</span>';
        actionsEl.innerHTML = '<button onclick="signIn()">Try Sign In</button>';
        return;
      }
      if (session) {
        const email = session.user.email || '';
        const isBcps = email.endsWith('@bcpsk12.com');
        statusEl.innerHTML = '<span class="ok">&#10003; Signed in as ' + email + '</span>'
          + (isBcps ? ' <span class="ok">(BCPS account &#10003;)</span>' : ' <span class="err">(NOT a @bcpsk12.com account)</span>');
        actionsEl.innerHTML = '<button class="danger" onclick="signOut()">Sign Out</button>';
        show('User email', email, 'ok');
        show('Provider', (session.user.app_metadata && session.user.app_metadata.provider) || 'unknown');
        show('Auth UID', session.user.id);
        show('Created at', session.user.created_at);
        show('User metadata', session.user.user_metadata || {});
        show('Identities', session.user.identities || []);
      } else {
        statusEl.innerHTML = '<span class="err">Not signed in</span>';
        actionsEl.innerHTML = '<button onclick="signIn()">Sign in with Google</button>';
      }
    }

    async function signIn() {
      statusEl.innerHTML = 'Redirecting to Google&hellip;';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.href,
          queryParams: { hd: 'bcpsk12.com' }
        }
      });
      if (error) {
        statusEl.innerHTML = '<span class="err">Sign-in error: ' + error.message + '</span>';
        actionsEl.innerHTML = '<button onclick="signIn()">Try Again</button>';
      }
    }

    async function signOut() {
      await sb.auth.signOut();
      refresh();
    }

    window.signIn = signIn;
    window.signOut = signOut;

    refresh();

    sb.auth.onAuthStateChange(function(event, session) {
      console.log('[auth event]', event, session);
      refresh();
    });
  </script>
</body>
</html>
