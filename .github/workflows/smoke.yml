name: Smoke test

# Runs the unit-1.html smoke test against the deployed Vercel URL after
# every push to main. Catches "did I just break the SOL prep entry flow?"
# before the next class period does.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Vercel auto-deploys on push to main. Wait for the new deploy to be
      # live before testing — otherwise we might run against the previous
      # version of the site.
      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Run smoke test
        run: npx playwright test
        env:
          TEST_BASE_URL: https://sghs-portal.vercel.app
          TEST_CLASS_CODE: ENG-3

      # Save screenshots / traces / HTML report on failure for debugging.
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
